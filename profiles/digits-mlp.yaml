# Real torch engine profile (sklearn digits + MLP). Validate:
#   python -m scholarloop.profile validate profiles/digits-mlp.yaml
name: digits-mlp
paradigm: supervised
train_entrypoint: engines/torch_vision/train.py
fixed_module: engines/torch_vision/prepare.py

metric:
  name: val_top1_err          # lower is better
  direction: minimize

budget:
  smoke_sec: 60               # one real torch run is ~1-2s on CPU; generous headroom
  verify_sec: 180
  full_sec: 600

datasets:
  - sklearn-digits

baselines:
  # Must-beat val error (%). Calibrated to this engine: the default MLP gets ~8%, modest tunes ~6%,
  # and a strong wide/long-trained config reaches ~3.1% — so 5.0 is a real bar that separates good
  # recipes from mediocre ones without being unreachable. Smoke screens with slack (Orchestrator
  # smoke_slack) so a borderline ~6% idea still earns a multi-seed verify before this gate decides.
  - logreg@5.0

knobs:                        # tunable hyperparameters (name → default) the agent sets in `config`
  lr: 0.1
  hidden: 64
  depth: 1
  weight_decay: 0.0001
  epochs: 40

allowed_edits:
  - architecture
  - optimizer
  - schedule
  - regularization

forbidden_edits:
  - "**/prepare.py"
  - prepare.py

debate_roles: [Innovator, Pragmatist, Contrarian]
